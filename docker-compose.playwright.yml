name: agach-qa
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: agach
      POSTGRES_USER: agach
      POSTGRES_PASSWORD: agach
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agach -d agach"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - playwright-net

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AGACH_HOST=0.0.0.0
      - AGACH_PORT=8322
      - DATABASE_URL=postgres://agach:agach@postgres:5432/agach
      - AGACH_JWT_SECRET=changeme_use_at_least_64_bytes_for_production_this_is_only_for_playwright_tests!
      - AGACH_CONFIG=/etc/agach/agach-server.yml
    volumes:
      - ./playwright/agach-server.yml:/etc/agach/agach-server.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8322/health"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - playwright-net

  qa-seed:
    build:
      context: .
      dockerfile: Dockerfile.qa-seed
    environment:
      - DATABASE_URL=postgres://agach:agach@postgres:5432/agach
    depends_on:
      server:
        condition: service_healthy
    networks:
      - playwright-net

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    working_dir: /app
    volumes:
      - ./playwright:/app
    environment:
      - BASE_URL=http://server:8322
    command: >
      sh -c "
        cp -r /app /tmp/pw && cd /tmp/pw &&
        chown -R pwuser:pwuser /tmp/pw &&
        exec su -s /bin/sh -c 'cd /tmp/pw && export HOME=/tmp && npm install && npx playwright test' pwuser
      "
    depends_on:
      server:
        condition: service_healthy
      qa-seed:
        condition: service_completed_successfully
    networks:
      - playwright-net

networks:
  playwright-net:
    driver: bridge
