version: '3.8'

name: agach-qa
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: agach
      POSTGRES_USER: agach
      POSTGRES_PASSWORD: agach
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agach -d agach"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - playwright-net

  kanban:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AGACH_HOST=0.0.0.0
      - AGACH_PORT=8322
      - DATABASE_URL=postgres://agach:agach@postgres:5432/agach
      - AGACH_JWT_SECRET=changeme_use_at_least_32_bytes_here
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8322/health"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - playwright-net

  qa-seed:
    build:
      context: .
      dockerfile: Dockerfile.qa-seed
    environment:
      - DATABASE_URL=postgres://agach:agach@postgres:5432/agach
    depends_on:
      kanban:
        condition: service_healthy
    networks:
      - playwright-net

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    working_dir: /app
    volumes:
      - ./playwright:/app
    environment:
      - BASE_URL=http://kanban:8322
    command: sh -c "npm install && npx playwright test"
    depends_on:
      kanban:
        condition: service_healthy
      qa-seed:
        condition: service_completed_successfully
    networks:
      - playwright-net

networks:
  playwright-net:
    driver: bridge
