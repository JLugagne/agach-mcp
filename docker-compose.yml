version: '3.8'
services:
  kanban:
    build: .
    ports:
      - "127.0.0.1:8322:8322"  # HTTP (REST API + WebSocket)
      - "127.0.0.1:8323:8323"  # MCP
    volumes:
      - ./data:/data
    environment:
      - AGACH_HOST=0.0.0.0
      - AGACH_PORT=8322
      - AGACH_MCP_HOST=0.0.0.0
      - AGACH_MCP_PORT=8323
      - AGACH_DATA_DIR=/data
    restart: unless-stopped
