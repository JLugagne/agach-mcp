version: '3.8'

name: agach-e2e-api

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: agach
      POSTGRES_USER: agach
      POSTGRES_PASSWORD: agach
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agach -d agach"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AGACH_HOST=0.0.0.0
      - AGACH_PORT=8322
      - DATABASE_URL=postgres://agach:agach@postgres:5432/agach
      - AGACH_JWT_SECRET=changeme_use_at_least_32_bytes_here
    ports:
      - "18322:8322"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8322/health"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
